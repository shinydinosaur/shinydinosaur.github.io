# Permalinks
#
# Use of `relative_permalinks` ensures post links from the index work properly.
permalink:           pretty
relative_permalinks: true

# Setup
title:               Shiny Dinosaur
tagline:             some personal musings
url:                 http://shinydinosaur.github.io
paginate:            1
baseurl:             http://shinydinosaur.github.io

# Assets
#
# We specify the directory for Jekyll so we can use @imports.
sass:
  sass_dir:          _sass
  style:            :compressed

# About/contact
author:
  name:              Shiry Ginosar

# Custom vars
version:             2.0.0
github:
  repo:              github.com/shinydinosaur/shinydinosaur.github.io
  
  # This is the list of pages to incldue in the header of the website.
pages_list:       {'About':'/about','Archive':'/archive','Feed':'/atom.xml'}